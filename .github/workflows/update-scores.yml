name: Update Scores

# Runs every 30 minutes (all day, every day).
# You can disable this workflow in GitHub after the tournament ends:
#   Actions tab → "Update Scores" → ⋯ → Disable workflow

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes, 24/7 during tournament week
  workflow_dispatch:            # also allows you to trigger it manually from GitHub

jobs:
  update-scores:
    runs-on: ubuntu-latest

    # Allow the workflow to commit back to the repo
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch live scores from ESPN
        run: node scripts/fetch-scores.js

      - name: Commit updated scores
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scores.json
          # Only commit if scores.json actually changed
          git diff --staged --quiet || git commit -m "chore: update scores [skip ci]"
          git push
